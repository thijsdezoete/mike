# Minimal Supabase gateway: route the two API prefixes supabase-js uses, and
# handle CORS here (the browser calls this from the frontend's origin).
# Upstreams resolve at request time via Docker's DNS (127.0.0.11) so recreating
# the auth/rest containers doesn't leave nginx pinned to a stale IP.
#
# Note: nginx add_header in a location does NOT apply to a response returned
# from inside an `if`, so the preflight branch repeats the CORS headers.

server {
    listen 8000;
    server_name _;
    client_max_body_size 50m;
    resolver 127.0.0.11 ipv6=off valid=10s;

    location /auth/v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;

        set $auth_upstream auth:9999;
        rewrite ^/auth/v1/(.*)$ /$1 break;
        proxy_pass http://$auth_upstream;
    }

    location /rest/v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;

        set $rest_upstream rest:3000;
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass http://$rest_upstream;
    }
}
